<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pauta de Reunião</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #ddd9d0;
    --border2: #ccc8be;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #9e9b94;
    --accent: #2a5c45;
    --accent-light: #e8f2ec;
    --accent-text: #1d4332;
    --danger: #c0392b;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 8px;
    --radius-lg: 14px;
  }
 
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
 
  .container {
    max-width: 680px;
    margin: 0 auto;
  }
 
  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
 
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
 
  header p {
    font-size: 14px;
    color: var(--text3);
    margin-top: 4px;
  }
 
  .meta-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
 
  .meta-row input {
    font-family: var(--sans);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
 
  .meta-row input:focus { border-color: var(--accent); }
  .meta-row input#meeting-title { flex: 1; }
  .meta-row input#meeting-date { width: 110px; }
 
  .topics-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 1rem;
  }
 
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
 
  .topic-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
 
  .topic-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
  }
 
  .topic-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    min-width: 20px;
  }
 
  .topic-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
  }
 
  .topic-text.editing {
    background: none;
    border: none;
    border-bottom: 1px solid var(--accent);
    outline: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    padding: 0;
  }
 
  .topic-actions {
    display: flex;
    gap: 2px;
  }
 
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 13px;
    color: var(--text3);
    transition: background 0.1s, color 0.1s;
    line-height: 1;
  }
 
  .btn-icon:hover { background: var(--surface2); color: var(--text2); }
  .btn-icon:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-icon.danger:hover { background: #fdecea; color: var(--danger); }
 
  .subtopics {
    padding: 0 14px 10px 44px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
 
  .subtopic-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .subtopic-bullet {
    color: var(--text3);
    font-size: 12px;
    flex-shrink: 0;
  }
 
  .subtopic-text {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
  }
 
  .subtopic-text.editing {
    background: none;
    border: none;
    border-bottom: 1px solid var(--border2);
    outline: none;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    width: 100%;
    padding: 0;
  }
 
  .sub-add-row {
    display: flex;
    gap: 6px;
    padding: 0 14px 10px 44px;
  }
 
  .sub-add-row input {
    flex: 1;
    font-family: var(--sans);
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
 
  .sub-add-row input:focus {
    background: var(--surface);
    border-color: var(--border2);
  }
 
  .sub-add-row button {
    font-family: var(--sans);
    font-size: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text2);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
 
  .sub-add-row button:hover { background: var(--surface2); border-color: var(--border2); }
 
  .add-topic-row {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
  }
 
  .add-topic-row input {
    flex: 1;
    font-family: var(--sans);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
 
  .add-topic-row input:focus { border-color: var(--accent); }
 
  .btn-primary {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
 
  .btn-primary:hover { background: var(--accent-text); }
 
  .preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
  }
 
  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
 
  .preview-header span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
 
  .btn-copy {
    font-family: var(--mono);
    font-size: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    color: var(--text2);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
 
  .btn-copy:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .btn-copy.copied { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
 
  #preview {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    padding: 16px;
    white-space: pre-wrap;
    line-height: 1.8;
    min-height: 80px;
  }
 
  .footer-actions {
    display: flex;
    justify-content: flex-end;
  }
 
  .btn-clear {
    font-family: var(--sans);
    font-size: 13px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.1s;
  }
 
  .btn-clear:hover { color: var(--danger); }
 
  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Montador de pauta</h1>
    <p>Organize os tópicos e copie pronto para colar onde quiser</p>
  </header>
 
  <div class="meta-row">
    <input type="text" id="meeting-title" placeholder="Título da reunião" oninput="updatePreview()" />
    <input type="text" id="meeting-date" placeholder="Data / hora" oninput="updatePreview()" />
  </div>
 
  <div class="topics-list" id="topics-list"></div>
 
  <div class="add-topic-row">
    <input type="text" id="new-topic" placeholder="Adicionar tópico à pauta..." onkeydown="if(event.key==='Enter')addTopic()" />
    <button class="btn-primary" onclick="addTopic()">+ Adicionar</button>
  </div>
 
  <div class="preview-box">
    <div class="preview-header">
      <span>Prévia</span>
      <button class="btn-copy" id="copy-btn" onclick="copyText()">Copiar</button>
    </div>
    <pre id="preview">Adicione tópicos para ver a prévia...</pre>
  </div>
 
  <div class="footer-actions">
    <button class="btn-clear" onclick="clearAll()">Limpar tudo</button>
  </div>
</div>
 
<script>
let topics = [];
 
function addTopic() {
  const input = document.getElementById('new-topic');
  const val = input.value.trim();
  if (!val) return;
  topics.push({ text: val, subtopics: [] });
  input.value = '';
  render();
}
 
function removeTopic(i) {
  topics.splice(i, 1);
  render();
}
 
function moveTopic(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= topics.length) return;
  [topics[i], topics[j]] = [topics[j], topics[i]];
  render();
}
 
function addSubtopic(i) {
  const input = document.getElementById('sub-input-' + i);
  const val = input.value.trim();
  if (!val) return;
  topics[i].subtopics.push(val);
  input.value = '';
  render();
}
 
function removeSubtopic(i, j) {
  topics[i].subtopics.splice(j, 1);
  render();
}
 
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
 
function render() {
  const list = document.getElementById('topics-list');
  if (topics.length === 0) {
    list.innerHTML = '';
    updatePreview();
    return;
  }
  list.innerHTML = topics.map((t, i) => `
    <div class="topic-card">
      <div class="topic-header">
        <span class="topic-num">${i + 1}.</span>
        <span class="topic-text">${esc(t.text)}</span>
        <div class="topic-actions">
          <button class="btn-icon" onclick="moveTopic(${i},-1)" ${i===0?'disabled':''} title="Mover para cima">↑</button>
          <button class="btn-icon" onclick="moveTopic(${i},1)" ${i===topics.length-1?'disabled':''} title="Mover para baixo">↓</button>
          <button class="btn-icon danger" onclick="removeTopic(${i})" title="Remover">✕</button>
        </div>
      </div>
      ${t.subtopics.length > 0 ? `
        <div class="subtopics">
          ${t.subtopics.map((s, j) => `
            <div class="subtopic-row">
              <span class="subtopic-bullet">—</span>
              <span class="subtopic-text">${esc(s)}</span>
              <button class="btn-icon danger" onclick="removeSubtopic(${i},${j})" title="Remover">✕</button>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="sub-add-row">
        <input id="sub-input-${i}" type="text" placeholder="Adicionar subtópico..." onkeydown="if(event.key==='Enter')addSubtopic(${i})" />
        <button onclick="addSubtopic(${i})">+ Sub</button>
      </div>
    </div>
  `).join('');
  updatePreview();
}
 
function updatePreview() {
  const title = document.getElementById('meeting-title').value.trim();
  const date = document.getElementById('meeting-date').value.trim();
  const pre = document.getElementById('preview');
  if (topics.length === 0 && !title) {
    pre.textContent = 'Adicione tópicos para ver a prévia...';
    return;
  }
  let lines = [];
  if (title || date) {
    lines.push('📅 ' + [title, date].filter(Boolean).join('  ·  '));
    lines.push('');
  }
  if (topics.length) {
    lines.push('Pauta:');
    topics.forEach((t, i) => {
      lines.push(`  ${i + 1}. ${t.text}`);
      t.subtopics.forEach(s => lines.push(`      — ${s}`));
    });
  }
  pre.textContent = lines.join('\n');
}
 
function copyText() {
  const pre = document.getElementById('preview');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copiado ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}
 
function clearAll() {
  if (!confirm('Limpar tudo?')) return;
  topics = [];
  document.getElementById('meeting-title').value = '';
  document.getElementById('meeting-date').value = '';
  render();
}
 
render();
</script>
</body>
</html>
